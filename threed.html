<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Reef Bloom — 3D (Experimental)</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0a3550; overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif; }
    #app3d { display: block; width: 100vw; height: 100vh; touch-action: none; }

    #back {
      position: fixed; left: 12px; top: 12px; z-index: 3;
      font-size: 13px; color: #cfe6f4; text-decoration: none;
      background: rgba(0,0,0,0.35); padding: 6px 10px; border-radius: 8px;
    }
    #slots { position: fixed; left: 12px; top: 46px; z-index: 3; display: flex; gap: 6px; }
    .slot-btn {
      font: inherit; font-size: 12px; color: #cfe6f4; cursor: pointer;
      background: rgba(0,0,0,0.35); border: 1px solid transparent;
      padding: 5px 10px; border-radius: 8px;
    }
    .slot-btn.active { border-color: #7fd8ff; background: rgba(20,80,120,0.7); color: #eaf6ff; }
    #hud {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 3;
      display: flex; gap: 14px; align-items: baseline; flex-wrap: wrap;
      justify-content: center; max-width: 94vw;
      background: rgba(0,0,0,0.38); padding: 8px 16px; border-radius: 12px;
      color: #eaf6ff;
    }
    #hud .stat { font-size: 15px; display: inline-flex; align-items: baseline; gap: 4px; }
    #hud .be { font-size: 20px; font-weight: 700; }
    #hud .be::before { content: "💧 "; }
    #hud .rate { font-size: 12px; color: #7fd8b0; margin-left: 4px; }
    #hud .shop { cursor: pointer; }
    #hud .shop:hover { color: #bfe6ff; }

    #shop-overlay {
      position: fixed; inset: 0; z-index: 5; display: none;
      align-items: center; justify-content: center; background: rgba(2,12,20,0.6);
    }
    #shop-overlay .panel, .modal3d .panel {
      background: #0d3550; border: 1px solid #2f6f92; border-radius: 14px;
      padding: 20px 22px; min-width: 232px; color: #eaf6ff;
    }
    .modal3d {
      position: fixed; inset: 0; z-index: 5; display: none;
      align-items: center; justify-content: center; background: rgba(2,12,20,0.6);
    }
    .modal3d .panel {
      max-height: 84vh; display: flex; flex-direction: column;
      min-width: 320px; max-width: 440px; width: 92vw;
    }
    .m-title { font-size: 16px; font-weight: 700; }
    .m-sub { font-size: 11px; color: #9fc4dc; margin-top: 3px; }
    .m-body {
      overflow-y: auto; margin-top: 8px; min-height: 0;
      scrollbar-width: thin; scrollbar-color: #2f6f92 transparent;
    }
    .m-tabs { display: flex; gap: 6px; margin-top: 10px; }
    .m-tab {
      font: inherit; font-size: 12px; color: #cfe6f4; cursor: pointer;
      background: rgba(0,0,0,0.35); border: 1px solid transparent;
      padding: 4px 10px; border-radius: 8px;
    }
    .m-tab.active { border-color: #7fd8ff; background: rgba(20,80,120,0.7); }
    .m-sec {
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: #7fb8d4; margin: 10px 0 4px;
    }
    .m-row {
      display: flex; align-items: center; gap: 8px; font-size: 12.5px;
      padding: 5px 2px; border-bottom: 1px solid rgba(47,111,146,0.25);
    }
    .m-row .dot { width: 11px; height: 11px; border-radius: 50%; flex: none; }
    .m-row small { color: #9fc4dc; margin-left: auto; text-align: right; flex: none; }
    .m-row.locked { opacity: 0.45; }
    .m-bar {
      height: 8px; border-radius: 4px; background: #12293a;
      overflow: hidden; margin: 3px 0 10px;
    }
    .m-bar span { display: block; height: 100%; background: #46c08a; border-radius: 4px; }
    .m-bar span.full { background: #ffd54f; }
    #menu3d { position: fixed; right: 12px; top: 12px; z-index: 3; display: flex; gap: 6px; }
    .menu-btn {
      font: inherit; font-size: 12px; color: #cfe6f4; cursor: pointer;
      background: rgba(0,0,0,0.35); border: 1px solid transparent;
      padding: 5px 10px; border-radius: 8px;
    }
    .menu-btn:hover { border-color: #7fd8ff; color: #eaf6ff; }
    .shop-pack {
      display: flex; justify-content: space-between; gap: 24px; width: 100%;
      background: rgba(20,80,120,0.5); border: 1px solid #2f6f92; color: #eaf6ff;
      border-radius: 8px; padding: 9px 12px; margin: 5px 0; cursor: pointer;
      font: inherit; font-size: 13px;
    }
    .shop-pack:hover { background: rgba(30,110,150,0.75); }
    .shop-close {
      width: 100%; margin-top: 8px; background: none; border: none;
      color: #9fc4dc; cursor: pointer; font: inherit; font-size: 12px; padding: 6px;
    }

    #palette {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); z-index: 3;
      display: flex; gap: 7px; flex-wrap: wrap; justify-content: center;
      align-content: flex-start; max-width: 94vw; max-height: 42vh; overflow-y: auto;
      padding: 8px 10px; background: rgba(3,18,28,0.55); border-radius: 12px;
      scrollbar-width: thin; scrollbar-color: #2f6f92 transparent;
    }
    #palette::-webkit-scrollbar { width: 8px; }
    #palette::-webkit-scrollbar-thumb { background: #2f6f92; border-radius: 4px; }
    .coral-btn {
      display: flex; align-items: center; gap: 6px;
      font: inherit; font-size: 13px; color: #eaf6ff; cursor: pointer;
      background: rgba(0,0,0,0.4); border: 1px solid transparent;
      padding: 6px 10px; border-radius: 20px;
    }
    .coral-btn small { color: #9fc4dc; }
    .coral-btn.sel { border-color: #7fd8ff; background: rgba(20,80,120,0.7); }
    .coral-btn .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    .coral-btn .lv {
      font-size: 10px; color: #ffd27f; background: rgba(0,0,0,0.35);
      padding: 1px 5px; border-radius: 8px; letter-spacing: 0.5px;
    }
    .coral-btn.locked { opacity: 0.4; }
    .coral-btn.locked .dot { filter: grayscale(1); }
    .remove-btn { border-color: rgba(239,83,80,0.5); color: #ffb4ac; }
    .remove-btn.on { background: rgba(239,83,80,0.55); border-color: #ef5350; color: #fff; }

    #hint {
      position: fixed; left: 12px; bottom: 64px; z-index: 3;
      font-size: 12px; color: #9fc4dc; background: rgba(0,0,0,0.3);
      padding: 5px 9px; border-radius: 8px; pointer-events: none;
    }
    #version-badge-3d {
      position: fixed; right: 10px; bottom: 8px; z-index: 3;
      font-size: 12px; color: #7fa8c0; letter-spacing: 1px; pointer-events: none;
    }
  </style>
</head>
<body>
  <a id="back" href="/">← Classic</a>
  <div id="slots"></div>
  <div id="menu3d"></div>
  <div id="hud">
    <span class="stat be"><span id="be-count">0</span><small class="rate" id="be-rate">+0.0/s</small></span>
    <span class="stat" title="Harmony">⚖ <span id="hm-count">50</span></span>
    <span class="stat" title="Level">⭐ <span id="lvl-count">1</span></span>
    <span class="stat" title="Polyps · click a coral to upgrade it">🌱 <span id="polyp-count">0</span></span>
    <span class="stat shop" id="shop-btn" title="Pearls · tap for the shop">💎 <span id="pearl-count">0</span></span>
  </div>
  <canvas id="app3d"></canvas>
  <div id="palette"></div>
  <div id="hint">🌿 Seagrass west · 🪸 Coral Reef centre · 🌌 Twilight east — plant in the matching biome · click a coral to upgrade · ✕ Remove to sell · drag to orbit.</div>
  <div id="version-badge-3d">3Dev 2.2</div>
  <script type="module">
    import { initReefScene3D } from './src/3d/ReefScene3D.js';
    initReefScene3D(document.getElementById('app3d'));
  </script>
</body>
</html>
