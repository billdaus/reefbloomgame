AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Reef Bloom sign-in & cloud save backend — Cognito User Pool (hosted
  email/password sign-in), Identity Pool issuing browser credentials, and a
  DynamoDB table where each player can only touch their own item. Serverless
  and effectively free at small scale.

Parameters:
  SiteUrl:
    Type: String
    Default: https://reefbloomgame.com
    Description: Production site origin (no trailing slash)
  DomainPrefix:
    Type: String
    Default: reef-bloom
    Description: Cognito hosted-UI domain prefix (must be globally unique per region)

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: reef-bloom-users
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireSymbols: false
          RequireNumbers: false

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref DomainPrefix
      UserPoolId: !Ref UserPool

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: reef-bloom-web
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows: [code]
      AllowedOAuthScopes: [openid, email]
      SupportedIdentityProviders: [COGNITO]
      CallbackURLs:
        - !Sub '${SiteUrl}/'
        - !Sub '${SiteUrl}/mobile/'
        - http://localhost:5173/
        - http://localhost:5173/mobile/
      LogoutURLs:
        - !Sub '${SiteUrl}/'
        - !Sub '${SiteUrl}/mobile/'
        - http://localhost:5173/
        - http://localhost:5173/mobile/

  IdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: reef_bloom_identities
      AllowUnauthenticatedIdentities: false
      CognitoIdentityProviders:
        - ClientId: !Ref UserPoolClient
          ProviderName: !GetAtt UserPool.ProviderName

  SaveTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: reef-bloom-saves
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH

  AuthenticatedRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: reef-bloom-authenticated
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref IdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: authenticated
      Policies:
        - PolicyName: own-save-item-only
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt SaveTable.Arn
                Condition:
                  ForAllValues:StringEquals:
                    dynamodb:LeadingKeys:
                      - '${cognito-identity.amazonaws.com:sub}'

  RoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref IdentityPool
      Roles:
        authenticated: !GetAtt AuthenticatedRole.Arn

Outputs:
  Region:
    Value: !Ref AWS::Region
  UserPoolId:
    Value: !Ref UserPool
  UserPoolClientId:
    Value: !Ref UserPoolClient
  CognitoDomain:
    Value: !Sub 'https://${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com'
  IdentityPoolId:
    Value: !Ref IdentityPool
  SaveTable:
    Value: !Ref SaveTable
